<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GigFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #151820;
      --surface2: #1c2030;
      --border: #252a3a;
      --accent: #f0b429;
      --accent2: #38bdf8;
      --danger: #f87171;
      --success: #4ade80;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(240,180,41,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,180,41,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .page { display: none; position: relative; z-index: 1; }
    .page.active { display: block; }

    /* AUTH */
    #auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    #auth-page.active { display: flex; }

    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2.5rem;
      position: relative;
    }

    .auth-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .brand { font-family: var(--mono); font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-bottom: 0.25rem; letter-spacing: -1px; }
    .brand span { color: var(--accent2); }
    .auth-subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; font-family: var(--mono); }

    .tab-row { display: flex; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .tab-btn { background: none; border: none; color: var(--muted); font-family: var(--mono); font-size: 0.8rem; padding: 0.5rem 1rem 0.75rem; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; letter-spacing: 0.5px; text-transform: uppercase; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .form-group { margin-bottom: 1.25rem; }

    label { display: block; font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 0.5rem; }

    input, textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 2px; color: var(--text); font-family: var(--sans); font-size: 0.9rem; padding: 0.65rem 0.85rem; outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.65rem 1.25rem; border: none; border-radius: 2px; font-family: var(--mono); font-size: 0.8rem; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: #0d0f14; width: 100%; justify-content: center; }
    .btn-primary:hover { background: #e0a800; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 0.4rem 0.75rem; font-size: 0.7rem; }

    .error-msg { background: rgba(248,113,113,0.1); border: 1px solid var(--danger); color: var(--danger); padding: 0.6rem 0.85rem; font-size: 0.8rem; font-family: var(--mono); border-radius: 2px; margin-bottom: 1rem; display: none; }
    .success-msg { background: rgba(74,222,128,0.1); border: 1px solid var(--success); color: var(--success); padding: 0.6rem 0.85rem; font-size: 0.8rem; font-family: var(--mono); border-radius: 2px; margin-bottom: 1rem; display: none; }

    /* NAV */
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
    .nav-brand { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .nav-brand span { color: var(--accent2); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-user { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); }

    .main { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem; }

    .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; }
    .page-title { font-family: var(--mono); font-size: 1.4rem; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .page-title span { display: block; font-size: 0.75rem; color: var(--muted); font-weight: 400; margin-top: 0.2rem; letter-spacing: 1px; text-transform: uppercase; }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 1.25rem; }
    .stat-label { font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 0.5rem; }
    .stat-value { font-family: var(--mono); font-size: 1.8rem; font-weight: 700; color: var(--accent); }

    .projects-grid { display: grid; gap: 1rem; }

    .project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 1.5rem; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
    .project-card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--border); transition: background 0.2s; }
    .project-card:hover { border-color: var(--accent); transform: translateX(4px); }
    .project-card:hover::after { background: var(--accent); }

    .project-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.75rem; }
    .project-name { font-family: var(--mono); font-size: 1rem; font-weight: 700; color: var(--text); }

    .badge { font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; padding: 0.2rem 0.6rem; border-radius: 2px; }
    .badge-active { background: rgba(74,222,128,0.1); color: var(--success); border: 1px solid rgba(74,222,128,0.3); }
    .badge-completed { background: rgba(100,116,139,0.1); color: var(--muted); border: 1px solid var(--border); }

    .project-desc { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; line-height: 1.5; }
    .project-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .meta-item { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); }
    .meta-item strong { color: var(--accent2); }

    .empty-state { text-align: center; padding: 4rem 2rem; border: 1px dashed var(--border); border-radius: 2px; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
    .empty-title { font-family: var(--mono); font-size: 1rem; color: var(--muted); margin-bottom: 0.5rem; }
    .empty-sub { font-size: 0.85rem; color: var(--muted); opacity: 0.6; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(13,15,20,0.85); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 2rem; width: 100%; max-width: 480px; position: relative; transform: translateY(16px); transition: transform 0.2s; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title { font-family: var(--mono); font-size: 1rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .modal-actions .btn { flex: 1; justify-content: center; }

    /* PROJECT DETAIL */
    .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; font-family: var(--mono); font-size: 0.75rem; color: var(--muted); cursor: pointer; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.2s; background: none; border: none; }
    .back-btn:hover { color: var(--accent); }

    .project-detail-header { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 1.5rem; margin-bottom: 2rem; position: relative; overflow: hidden; }
    .project-detail-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .project-detail-title { font-family: var(--mono); font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
    .project-detail-meta { display: flex; gap: 2rem; margin-top: 1rem; flex-wrap: wrap; }
    .project-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-title { font-family: var(--mono); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }

    .tasks-list { display: grid; gap: 0.75rem; }

    .task-item { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem; transition: border-color 0.2s; }
    .task-item.completed { opacity: 0.5; }

    .task-check { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 2px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-size: 0.65rem; color: transparent; }
    .task-check.done { background: var(--success); border-color: var(--success); color: #0d0f14; }

    .task-info { flex: 1; }
    .task-title { font-size: 0.9rem; font-weight: 500; }
    .task-item.completed .task-title { text-decoration: line-through; color: var(--muted); }
    .task-hours { font-family: var(--mono); font-size: 0.75rem; color: var(--accent2); margin-top: 0.2rem; }
    .task-actions { display: flex; gap: 0.5rem; }

    .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    #toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 2px; padding: 0.75rem 1.25rem; font-family: var(--mono); font-size: 0.8rem; color: var(--text); z-index: 999; transform: translateY(8px); opacity: 0; transition: all 0.3s; pointer-events: none; }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.toast-success { border-color: var(--success); color: var(--success); }
    #toast.toast-error { border-color: var(--danger); color: var(--danger); }
  </style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="auth-page" class="page active">
  <div class="auth-card">
    <div class="brand">Gig<span>Flow</span></div>
    <div class="auth-subtitle">// freelance project tracker</div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>
    <div id="auth-error" class="error-msg"></div>
    <div id="auth-success" class="success-msg"></div>

    <div id="login-form">
      <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="login-password" placeholder="••••••••"/></div>
      <button class="btn btn-primary" onclick="handleLogin()">Login →</button>
    </div>

    <div id="register-form" style="display:none">
      <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="you@example.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="reg-password" placeholder="••••••••"/></div>
      <button class="btn btn-primary" onclick="handleRegister()">Create Account →</button>
    </div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboard-page" class="page">
  <nav>
    <div class="nav-brand">Gig<span>Flow</span></div>
    <div class="nav-right">
      <span class="nav-user" id="nav-email"></span>
      <button class="btn btn-secondary btn-sm" onclick="handleLogout()">Logout</button>
    </div>
  </nav>
  <div class="main">
    <div class="page-header">
      <div class="page-title">Projects<span>Your active work</span></div>
      <button class="btn btn-primary" onclick="openProjectModal()" style="width:auto">+ New Project</button>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total Projects</div><div class="stat-value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value" id="stat-active">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Hours</div><div class="stat-value" id="stat-hours">—</div></div>
    </div>
    <div id="projects-container"></div>
  </div>
</div>

<!-- PROJECT DETAIL PAGE -->
<div id="project-page" class="page">
  <nav>
    <div class="nav-brand">Gig<span>Flow</span></div>
    <div class="nav-right">
      <span class="nav-user" id="nav-email-2"></span>
      <button class="btn btn-secondary btn-sm" onclick="handleLogout()">Logout</button>
    </div>
  </nav>
  <div class="main">
    <button class="back-btn" onclick="showDashboard()">← Back to Projects</button>
    <div id="project-detail-container"></div>
    <hr class="divider"/>
    <div class="section-header">
      <div class="section-title">Tasks</div>
      <button class="btn btn-secondary btn-sm" onclick="openTaskModal()">+ Add Task</button>
    </div>
    <div id="tasks-container"></div>
  </div>
</div>

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="project-modal">
  <div class="modal">
    <div class="modal-title" id="project-modal-title">New Project</div>
    <div id="project-form-error" class="error-msg"></div>
    <div class="form-group"><label>Project Name</label><input type="text" id="proj-name" placeholder="e.g. Client Dashboard"/></div>
    <div class="form-group"><label>Description</label><textarea id="proj-desc" rows="3" placeholder="What is this project about?"></textarea></div>
    <div class="form-group"><label>Hourly Rate (₹)</label><input type="number" id="proj-rate" placeholder="e.g. 2500" min="0"/></div>
    <div class="form-group" id="proj-status-group" style="display:none">
      <label>Status</label>
      <select id="proj-status"><option value="active">Active</option><option value="completed">Completed</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeProjectModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()">Save →</button>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-title" id="task-modal-title">Add Task</div>
    <div id="task-form-error" class="error-msg"></div>
    <div class="form-group"><label>Task Title</label><input type="text" id="task-title" placeholder="e.g. Build login page"/></div>
    <div class="form-group"><label>Hours Logged</label><input type="number" id="task-hours" placeholder="0" min="0" step="0.5"/></div>
    <div class="form-group" id="task-status-group" style="display:none">
      <label>Status</label>
      <select id="task-completed"><option value="false">In Progress</option><option value="true">Completed</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save →</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://127.0.0.1:8000';
  let token = localStorage.getItem('gigflow_token');
  let userEmail = localStorage.getItem('gigflow_email');
  let currentProjectId = null;
  let editingProjectId = null;
  let editingTaskId = null;

  if (token) showDashboard();

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showDashboard() {
    showPage('dashboard-page');
    document.getElementById('nav-email').textContent = userEmail || '';
    loadProjects();
  }

  function showProjectPage(id) {
    currentProjectId = id;
    showPage('project-page');
    document.getElementById('nav-email-2').textContent = userEmail || '';
    loadProjectDetail(id);
  }

  async function apiFetch(path, options = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(`${API}${path}`, { ...options, headers });
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, status: res.status, data };
  }

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show toast-${type}`;
    setTimeout(() => el.className = '', 2500);
  }

  function showError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block'; }
  function hideError(id) { document.getElementById(id).style.display = 'none'; }

  // AUTH
  function switchTab(tab) {
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    hideError('auth-error');
    document.getElementById('auth-success').style.display = 'none';
  }

  async function handleLogin() {
    hideError('auth-error');
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showError('auth-error', 'Email and password are required');
    const { ok, data } = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    if (!ok) return showError('auth-error', data.detail || 'Login failed');
    token = data.access_token;
    userEmail = email;
    localStorage.setItem('gigflow_token', token);
    localStorage.setItem('gigflow_email', email);
    showDashboard();
  }

  async function handleRegister() {
    hideError('auth-error');
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!email || !password) return showError('auth-error', 'All fields are required');
    const { ok, data } = await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ email, password }) });
    if (!ok) return showError('auth-error', data.detail || 'Registration failed');
    const s = document.getElementById('auth-success');
    s.textContent = 'Account created! Please login.';
    s.style.display = 'block';
    switchTab('login');
  }

  function handleLogout() {
    token = null; userEmail = null;
    localStorage.removeItem('gigflow_token');
    localStorage.removeItem('gigflow_email');
    showPage('auth-page');
  }

  // PROJECTS
  async function loadProjects() {
    const container = document.getElementById('projects-container');
    container.innerHTML = '<div class="loader"></div>';
    const { ok, data } = await apiFetch('/projects/');
    if (!ok) { container.innerHTML = '<p style="color:var(--danger);font-family:var(--mono);font-size:.8rem">Failed to load projects</p>'; return; }

    const active = data.filter(p => p.status === 'active').length;
    const hours = data.reduce((sum, p) => sum + p.tasks.reduce((s, t) => s + t.hours_logged, 0), 0);
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-hours').textContent = hours.toFixed(1) + 'h';

    if (data.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-title">No projects yet</div><div class="empty-sub">Create your first project to get started</div></div>`;
      return;
    }
    container.innerHTML = `<div class="projects-grid">${data.map(projectCard).join('')}</div>`;
  }

  function projectCard(p) {
    const hours = p.tasks.reduce((s, t) => s + t.hours_logged, 0);
    const earnings = (hours * p.hourly_rate).toFixed(0);
    return `<div class="project-card" onclick="showProjectPage(${p.id})">
      <div class="project-card-header">
        <div class="project-name">${p.name}</div>
        <span class="badge badge-${p.status}">${p.status}</span>
      </div>
      ${p.description ? `<div class="project-desc">${p.description}</div>` : ''}
      <div class="project-meta">
        <div class="meta-item">Rate <strong>₹${p.hourly_rate}/hr</strong></div>
        <div class="meta-item">Tasks <strong>${p.tasks.length}</strong></div>
        <div class="meta-item">Hours <strong>${hours.toFixed(1)}h</strong></div>
        <div class="meta-item">Earned <strong>₹${earnings}</strong></div>
      </div>
    </div>`;
  }

  function openProjectModal(project = null) {
    editingProjectId = project ? project.id : null;
    document.getElementById('project-modal-title').textContent = project ? 'Edit Project' : 'New Project';
    document.getElementById('proj-name').value = project ? project.name : '';
    document.getElementById('proj-desc').value = project ? (project.description || '') : '';
    document.getElementById('proj-rate').value = project ? project.hourly_rate : '';
    document.getElementById('proj-status-group').style.display = project ? 'block' : 'none';
    if (project) document.getElementById('proj-status').value = project.status;
    hideError('project-form-error');
    document.getElementById('project-modal').classList.add('open');
  }

  function closeProjectModal() { document.getElementById('project-modal').classList.remove('open'); }

  async function saveProject() {
    hideError('project-form-error');
    const name = document.getElementById('proj-name').value.trim();
    const description = document.getElementById('proj-desc').value.trim();
    const hourly_rate = parseFloat(document.getElementById('proj-rate').value);
    if (!name || isNaN(hourly_rate)) return showError('project-form-error', 'Name and hourly rate are required');

    const body = { name, description, hourly_rate };
    if (editingProjectId) body.status = document.getElementById('proj-status').value;

    const { ok, data } = await apiFetch(
      editingProjectId ? `/projects/${editingProjectId}` : '/projects/',
      { method: editingProjectId ? 'PUT' : 'POST', body: JSON.stringify(body) }
    );
    if (!ok) return showError('project-form-error', data.detail || 'Failed to save project');
    closeProjectModal();
    toast(editingProjectId ? 'Project updated!' : 'Project created!');
    if (editingProjectId && currentProjectId) loadProjectDetail(currentProjectId);
    else loadProjects();
  }

  async function deleteProject(id) {
    if (!confirm('Delete this project and all its tasks?')) return;
    const { ok } = await apiFetch(`/projects/${id}`, { method: 'DELETE' });
    if (!ok) return toast('Failed to delete project', 'error');
    toast('Project deleted');
    showDashboard();
  }

  async function loadProjectDetail(id) {
    const { ok, data } = await apiFetch(`/projects/${id}`);
    if (!ok) { toast('Failed to load project', 'error'); showDashboard(); return; }

    const hours = data.tasks.reduce((s, t) => s + t.hours_logged, 0);
    const earnings = (hours * data.hourly_rate).toFixed(0);
    const completed = data.tasks.filter(t => t.is_completed).length;

    document.getElementById('project-detail-container').innerHTML = `
      <div class="project-detail-header">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem">
          <div>
            <div class="project-detail-title">${data.name}</div>
            ${data.description ? `<div style="color:var(--muted);font-size:.85rem;margin-top:.25rem">${data.description}</div>` : ''}
          </div>
          <span class="badge badge-${data.status}">${data.status}</span>
        </div>
        <div class="project-detail-meta">
          <div class="meta-item">Rate <strong>₹${data.hourly_rate}/hr</strong></div>
          <div class="meta-item">Hours <strong>${hours.toFixed(1)}h</strong></div>
          <div class="meta-item">Earned <strong>₹${earnings}</strong></div>
          <div class="meta-item">Tasks <strong>${completed}/${data.tasks.length} done</strong></div>
        </div>
        <div class="project-actions">
          <button class="btn btn-secondary btn-sm" onclick='openProjectModal(${JSON.stringify(data)})'>Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProject(${data.id})">Delete</button>
        </div>
      </div>`;

    renderTasks(data.tasks);
  }

  function renderTasks(tasks) {
    const container = document.getElementById('tasks-container');
    if (tasks.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">No tasks yet</div><div class="empty-sub">Add your first task to start tracking time</div></div>`;
      return;
    }
    container.innerHTML = `<div class="tasks-list">${tasks.map(t => `
      <div class="task-item ${t.is_completed ? 'completed' : ''}">
        <div class="task-check ${t.is_completed ? 'done' : ''}" onclick="toggleTask(${t.id}, ${!t.is_completed})">${t.is_completed ? '✓' : ''}</div>
        <div class="task-info">
          <div class="task-title">${t.title}</div>
          <div class="task-hours">${t.hours_logged}h logged</div>
        </div>
        <div class="task-actions">
          <button class="btn btn-secondary btn-sm" onclick='openTaskModal(${JSON.stringify(t)})'>Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTask(${t.id})">✕</button>
        </div>
      </div>`).join('')}</div>`;
  }

  function openTaskModal(task = null) {
    editingTaskId = task ? task.id : null;
    document.getElementById('task-modal-title').textContent = task ? 'Edit Task' : 'Add Task';
    document.getElementById('task-title').value = task ? task.title : '';
    document.getElementById('task-hours').value = task ? task.hours_logged : '';
    document.getElementById('task-status-group').style.display = task ? 'block' : 'none';
    if (task) document.getElementById('task-completed').value = String(task.is_completed);
    hideError('task-form-error');
    document.getElementById('task-modal').classList.add('open');
  }

  function closeTaskModal() { document.getElementById('task-modal').classList.remove('open'); }

  async function saveTask() {
    hideError('task-form-error');
    const title = document.getElementById('task-title').value.trim();
    const hours_logged = parseFloat(document.getElementById('task-hours').value) || 0;
    if (!title) return showError('task-form-error', 'Task title is required');

    const body = editingTaskId
      ? { title, hours_logged, is_completed: document.getElementById('task-completed').value === 'true' }
      : { title, hours_logged };
    const url = editingTaskId ? `/tasks/${editingTaskId}` : `/projects/${currentProjectId}/tasks/`;
    const method = editingTaskId ? 'PUT' : 'POST';

    const { ok, data } = await apiFetch(url, { method, body: JSON.stringify(body) });
    if (!ok) return showError('task-form-error', data.detail || 'Failed to save task');
    closeTaskModal();
    toast(editingTaskId ? 'Task updated!' : 'Task added!');
    loadProjectDetail(currentProjectId);
  }

  async function toggleTask(id, is_completed) {
    const { ok } = await apiFetch(`/tasks/${id}`, { method: 'PUT', body: JSON.stringify({ is_completed }) });
    if (!ok) return toast('Failed to update task', 'error');
    loadProjectDetail(currentProjectId);
  }

  async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    const { ok } = await apiFetch(`/tasks/${id}`, { method: 'DELETE' });
    if (!ok) return toast('Failed to delete task', 'error');
    toast('Task deleted');
    loadProjectDetail(currentProjectId);
  }

  document.getElementById('project-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeProjectModal(); });
  document.getElementById('task-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeTaskModal(); });
  document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
